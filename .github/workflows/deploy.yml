name: Deploy

# On every push to main, push that same commit to the server's bare repo
# over SSH. The server's post-receive hook does the checkout/build/restart.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to server bare repo
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_GIT_DIR: ${{ secrets.DEPLOY_GIT_DIR }}   # e.g. /home/vocab-learn/vocab-learn.git
        run: |
          set -e
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          git remote add deploy "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_GIT_DIR"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key" git push deploy HEAD:main
